name: Release Module

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SOPS
        uses: mdgreenwald/mozilla-sops-action@v1.6.0
        with:
          version: 'latest'

      - name: Decrypt secrets
        id: decrypt_secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "$SOPS_AGE_KEY" ]; then
            echo "Error: SOPS_AGE_KEY is not set in GitHub Secrets."
            echo "Please ensure you have added the 'SOPS_AGE_KEY' secret to your repository settings."
            exit 1
          fi
          DIST_REPO_PAT=$(sops -d --extract '["DIST_REPO_PAT"]' secrets.enc.yaml)
          echo "::add-mask::$DIST_REPO_PAT"
          echo "DIST_REPO_PAT=$DIST_REPO_PAT" >> $GITHUB_ENV

      - name: Extract version
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Substitute version in module.json
        run: |
          # Replace the version in module.json with the tag version
          sed -i 's/"version": ".*"/"version": "${{ steps.extract_version.outputs.VERSION }}"/g' historia-it/module.json
          # Replace the download link if it relies on a specific tag
          sed -i "s|/releases/latest/download/historia-it.zip|/releases/download/v${{ steps.extract_version.outputs.VERSION }}/historia-it.zip|g" historia-it/module.json

      - name: Create ZIP archive
        run: |
          mkdir -p zip-output
          # Copy only the generated module files
          cp -r historia-it zip-output/
          cd zip-output
          zip -r historia-it.zip historia-it/

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'zip-output/historia-it.zip,historia-it/module.json'
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Release ${{ steps.extract_version.outputs.VERSION }}
          tag: ${{ github.ref }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
          skipIfReleaseExists: true

      - name: Create Release on Distribution Repo
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'zip-output/historia-it.zip,historia-it/module.json'
          token: ${{ env.DIST_REPO_PAT }}
          owner: digennarot
          repo: historia-it-dist
          name: Release ${{ steps.extract_version.outputs.VERSION }}
          tag: v${{ steps.extract_version.outputs.VERSION }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
          skipIfReleaseExists: true

      - name: Update module.json in Distribution Repo Main
        run: |
          git clone https://x-access-token:${{ env.DIST_REPO_PAT }}@github.com/digennarot/historia-it-dist.git dist-repo
          cp historia-it/module.json dist-repo/module.json
          cd dist-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.json
          git commit -m "Update module.json to v${{ steps.extract_version.outputs.VERSION }}" || echo "No changes to commit"
          git push
